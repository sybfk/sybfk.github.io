<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code介绍</title>
    <style>
        /* 全局样式重置，统一行高 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 1.8;
        }

        /* 标签选择器：全局body样式 */
        body {
            font-family: "Microsoft Yahei", sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            color: #0a0a0a;
        }

        /* 标签选择器：主标题h1样式 */
        h1 {
            font-size: 30px;
            text-align: center;
            font-weight: bold;
            color: #57b0f9;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid #4ba8f3;
        }

        /* 类选择器：小标题样式 */
        .subtitle {
            font-size: 22px;
            font-weight: bold;
            color: #3b06b9;
            margin: 30px 0 15px;
        }

        /* 标签选择器：正文p标签样式 */
        p {
            font-size: 16px;
            text-indent: 2em;
            margin-bottom: 20px;
        }

        /* ID选择器：介绍段落高亮样式 */
        #intro-highlight {
            background-color: #9582da;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
        }

        /* ID选择器：结尾段落高亮样式 */
        #footer-highlight {
            background-color: #9e82f1;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
        }

        /* 标签选择器：无序列表样式 */
        ul {
            font-size: 16px;
            margin-left: 40px;
            /* 替换列表标号为自定义图片，尺寸10px左右 */
            list-style-image: url("https://img.icons8.com/fluency/10/000000/star.png");
        }

        /* 类选择器：列表项样式 */
        .list-item {
            margin-bottom: 8px;
            padding-left: 8px;
        }
    </style>
</head>
<body>
    <!-- 主标题：1个，居中显示 -->
    <h1>Claude Code —— 智能AI编程助手</h1>

    <!-- 第一个小标题 -->
    <h2 class="subtitle">什么是 Claude Code?</h2>
    <!-- 第一段正文 -->
    <p>Claude Code 是由 Anthropic 公司推出的<span id="intro-highlight">AI编程助手</span>，可以帮助初学者快速写代码、查错误、学逻辑，非常适合新手学习。</p >

    <!-- 第二个小标题 -->
    <h2 class="subtitle">Claude Code 核心优势</h2>
    <!-- 无序列表：1个，使用自定义图片标号 -->
    <ul>
        <li class="list-item">支持HTML、CSS、JavaScript、Python等多种语言</li>
        <li class="list-item">智能代码提示与自动修复</li>
        <li class="list-item">代码逻辑详细讲解</li>
        <li class="list-item">免费使用基础功能</li>
        <li class="list-item">界面简洁、容易上手</li>
    </ul>

    <!-- 第二段正文 -->
    <p>如果你正在学习编程，<span id="footer-highlight">Claude Code</span>会是你学习路上非常好的帮手，随时解答你的编程问题。</p >
</body>
</html>
