<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* 深蓝到浅绿渐变背景 */
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 25%, #2d6a8f 50%, #4db8a8 75%, #7dd8b0 100%);
            position: relative;
            font-family: 'Courier New', monospace;
            color: white;
        }

        /* 星空背景 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* 文字内容居中 */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .main-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .status-info {
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.8;
        }

        /* 底部进度条 */
        .progress-bar {
            position: absolute;
            bottom: 80px;
            left: 10%;
            width: 80%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #4db8a8, #7dd8b0);
            border-radius: 2px;
            animation: flow 3s infinite ease-in-out;
        }

        @keyframes flow {
            0%, 100% {
                width: 30%;
            }
            50% {
                width: 70%;
            }
        }

        /* 右下角图标 */
        .corner-icon {
            position: absolute;
            bottom: 60px;
            right: 60px;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .corner-icon::after {
            content: "♢";
            color: white;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="content">
        <div class="main-number">25051030303</div>
        <div class="status-info">
            <a href="rwyi.html">Claude Code介绍</a>
            <a href="rwer.html">认真严谨的习惯</a>
            <br>
            <a href="rwsan.html">播放器</a>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>

    <div class="corner-icon"></div>

    <script>
        // 生成随机星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 150;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // 随机位置
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                
                // 随机大小
                const size = Math.random() * 3 + 1;
                
                // 随机动画延迟
                const delay = Math.random() * 2;
                
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.animationDelay = `${delay}s`;
                
                starsContainer.appendChild(star);
            }
        }

        window.onload = createStars;
    </script>
</body>
</html>
